  <script type="importmap">
  {
    "imports": {
      "pdfjs-dist": "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/+esm",
      "pdfjs-dist/types/src/display/api": "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/+esm",
      "pdfjs-dist/types/web/interfaces": "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/+esm",
      "@toon-format/toon": "https://cdn.jsdelivr.net/npm/@toon-format/toon@2.1.0/+esm",
      "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.24.2/dist/ort.all.bundle.min.mjs",
      "ppu-paddle-ocr/web": "https://cdn.jsdelivr.net/npm/ppu-paddle-ocr@4.0.2/web/index.js",
      "ppu-ocv/web": "https://cdn.jsdelivr.net/npm/ppu-ocv@2/index.web.js"
    }
  }
  </script>

  <script type="module">
    // ── Import ppu-pdf/web from CDN ──────────────────
    // We try jsdelivr first; in local dev ("bun run demo") we fall back to the built lib/
    let ppuPdf;
    try {
      ppuPdf = await import("https://cdn.jsdelivr.net/npm/ppu-pdf@6/web/index.js");
    } catch (cdnErr) {
      console.log("CDN import failed, falling back to local lib/ (ensure you ran 'bun task build'). Error:", cdnErr);
      try {
        ppuPdf = await import("./lib/web/index.js");
      } catch (localErr) {
        console.error("Local import of ./lib/web/index.js failed. Did you run 'bun task build'? Error:", localErr);
        ppuPdf = await import("./src/web/index.ts");
      }
    }
    const { PdfReaderLegacyWeb } = ppuPdf;

    // ── Global State ─────────────────────────────────
    let reader = new PdfReaderLegacyWeb({ verbose: true });
    let currentFile = null;
    let currentResults = null; // { texts, pageLines, compactLines, isScanned, toonOutput, canvasMap, elapsed, numPages, options }
    let currentPage = 1;
    let currentTab = "fulltext"; // fulltext, words, lines, compact, toon
    let activeViz = "preview";   // preview, lines, words
    let zoomLevel = 1.0;
    
    // Globally eager-load PaddleOCR WebAssembly
    window.globalOcrAdapter = null;
    
    // ── OCR Initialization (Top Level Await) ──────────────────────────────
    const uploadWrapper = document.getElementById("uploadBtn");
    const emptyOutputSpan = document.getElementById("emptyPreview");
    const ocrDot = document.getElementById("ocrStatusDot");
    const ocrLabel = document.getElementById("ocrStatusLabel");

    uploadWrapper.classList.add("opacity-50", "cursor-wait");
    emptyOutputSpan.innerHTML = `<span class="animate-pulse">Loading PaddleOCR Native Engine...</span>`;

    try {
      const { PaddleOcrService } = await import("ppu-paddle-ocr/web");
      const service = new PaddleOcrService();
      await service.initialize();

      window.globalOcrAdapter = {
        initialize: async () => {},
        recognize: async (canvas) => {
          emptyPreview.innerHTML = `<span class="animate-pulse">Running OCR...</span>`;
          return await service.recognize(canvas);
        }
      };

      ocrDot.classList.replace("bg-red-500", "bg-green-500");
      ocrDot.classList.remove("animate-pulse");
      ocrDot.classList.replace("shadow-[0_0_8px_rgba(239,68,68,0.8)]", "shadow-[0_0_8px_rgba(34,197,94,0.8)]");
      ocrLabel.textContent = "PaddleOCR Ready";
      ocrLabel.classList.remove("animate-pulse");
      ocrLabel.classList.replace("text-red-500", "text-green-500");
      emptyOutputSpan.innerHTML = `Upload a PDF to view`;
    } catch (err) {
      console.error("Critical OCR Initialization Failure:", err);
      ocrDot.classList.replace("bg-red-500", "bg-yellow-500");
      ocrDot.classList.remove("animate-pulse");
      ocrDot.classList.replace("shadow-[0_0_8px_rgba(239,68,68,0.8)]", "shadow-[0_0_8px_rgba(234,179,8,0.8)]");
      ocrLabel.textContent = "OCR Offline";
      ocrLabel.classList.replace("text-red-500", "text-yellow-600");
      emptyOutputSpan.innerHTML = `Native OCR Unavailable. Upload a PDF for standard reading.`;
    } finally {
      uploadWrapper.classList.remove("opacity-50", "cursor-wait");
    }

    // ── DOM refs ─────────────────────────────────────
    const fileInput = document.getElementById("fileInput");
    const loaderText = document.getElementById("loaderText");
    const uploadBtn = document.getElementById("uploadBtn");
    const resultsArea = document.getElementById("resultsArea");
    
    // Header status
    const statusHeader = document.getElementById("statusHeader");
    const timeVal = document.getElementById("timeVal");
    const scannedBadge = document.getElementById("scannedBadge");
    const digitalBadge = document.getElementById("digitalBadge");

    // Output area
    const outputArea = document.getElementById("outputArea");
    const outputContent = document.getElementById("outputContent");
    const emptyOutput = document.getElementById("emptyOutput");
    const copyBtn = document.getElementById("copyBtn");

    // Canvas mapping
    const canvasScrollArea = document.getElementById("canvasScrollArea");
    const pageContainer = document.getElementById("pageContainer");
    const emptyPreview = document.getElementById("emptyPreview");

    // Pagination
    const pagination = document.getElementById("pagination");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageIndicator = document.getElementById("pageIndicator");

    // Visualization
    const vizToggles = document.getElementById("vizToggles");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomIndicator = document.getElementById("zoomIndicator");

    // Config controls
    const optExcludeHeader = document.getElementById("optExcludeHeader");
    const optExcludeFooter = document.getElementById("optExcludeFooter");
    const optMerge = document.getElementById("optMerge");
    const optToon = document.getElementById("optToon");
    const optAlgorithm = document.getElementById("optAlgorithm");
    const optThresholdLength = document.getElementById("optThresholdLength");
    const optThresholdWords = document.getElementById("optThresholdWords");
    const optRenderDPI = document.getElementById("optRenderDPI");

    // ── Zoom Management ──────────────────────────────
    function updateZoom() {
       zoomIndicator.textContent = Math.round(zoomLevel * 100) + "%";
       
       if (pageContainer && !pageContainer.classList.contains("hidden")) {
           // We explicitly update dimensions so scrollbars track 100% properly
           const canvas = currentResults?.canvasMap.get(currentPage);
           if (!canvas) return;
           
           // Calculate base fit-to-screen scale for 100% zoom
           const scrollArea = document.getElementById("canvasScrollArea");
           
           // We'll leave a small padding gap
           const padding = 48;
           const targetW = scrollArea.clientWidth - padding;
           const targetH = scrollArea.clientHeight - padding;
           
           const scaleToFit = Math.min(targetW / canvas.width, targetH / canvas.height);
           
           // The "100%" base dimensions
           const baseW = canvas.width * scaleToFit;
           const baseH = canvas.height * scaleToFit;
           
           pageContainer.style.width = `${baseW * zoomLevel}px`;
           pageContainer.style.height = `${baseH * zoomLevel}px`;
           
           // Scale inner graphics layers explicitly matching container
           const displayImg = document.getElementById("renderedCanvasImg");
           if (displayImg) {
              displayImg.style.width = '100%';
              displayImg.style.height = '100%';
           }
           const overlayWrapper = document.getElementById("overlayWrapper");
           if (overlayWrapper) {
               // Provide inner overlays a reference 
               const transformScale = (scaleToFit * zoomLevel);
               overlayWrapper.style.transform = `scale(${transformScale})`;
           }
       }
    }

    zoomInBtn.addEventListener("click", () => {
       zoomLevel = Math.min(zoomLevel + 0.25, 3.0);
       updateZoom();
    });

    zoomOutBtn.addEventListener("click", () => {
       zoomLevel = Math.max(zoomLevel - 0.25, 1.0); // Never zoom below fit-to-screen
       updateZoom();
    });

    // ── File upload ──────────────────────────────────
    fileInput.addEventListener("change", (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    uploadBtn.addEventListener("click", () => {
      // Gate interaction until OCR WebAssembly compiles natively into Safari/Chrome
      if (window.globalOcrAdapter === null) return;
      fileInput.click();
    });

    async function handleFile(file) {
      if (!file) return;
      currentFile = file;
      resultsArea.classList.remove("hidden");
      await processBuffer(file.name);
    }

    // Re-process button
    document.getElementById("reprocessBtn").addEventListener("click", () => {
      if (currentFile) processBuffer("(re-process)");
    });

    // ── Tab switching ────────────────────────────────
    document.getElementById("dataTabs").addEventListener("click", (e) => {
      if (e.target.tagName !== "BUTTON" && !e.target.closest("button[data-tab]")) return;
      const btn = e.target.closest("button[data-tab]");
      if (!btn) return;
      
      document.querySelectorAll("#dataTabs button[data-tab]").forEach((t) => {
        t.classList.remove("border-red-600", "text-red-600");
        t.classList.add("border-transparent", "text-gray-500");
      });
      btn.classList.add("border-red-600", "text-red-600");
      btn.classList.remove("border-transparent", "text-gray-500");
      
      currentTab = btn.dataset.tab;
      renderOutputArea();
    });

    // ── Pagination ───────────────────────────────────
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        renderMainView();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentResults && currentPage < currentResults.numPages) {
        currentPage++;
        renderMainView();
      }
    });

    // ── Visualization ────────────────────────────────
    vizToggles.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-val]");
      if (!btn) return;

      document.querySelectorAll("#vizToggles button").forEach((t) => t.classList.remove("bg-red-700"));
      btn.classList.add("bg-red-700");
      activeViz = btn.dataset.val;

      renderMainView();
    });

    // ── Process ──────────────────────────────────────
    async function processBuffer(filename) {
      if (!currentFile) return;

      loaderText.classList.remove("hidden");
      loaderText.textContent = `Processing…`;
      pageContainer.classList.add("hidden");
      emptyPreview.classList.remove("hidden");
      document.getElementById("emptyPreviewWrapper").classList.remove("hidden");
      emptyPreview.innerHTML = `<span class="animate-pulse">Parsing PDF...</span>`;

      await new Promise((r) => setTimeout(r, 50)); // let UI update

      const options = {
        excludeHeader: optExcludeHeader.checked,
        excludeFooter: optExcludeFooter.checked,
        raw: false,
        mergeCloseTextNeighbor: optMerge.checked,
        simpleSortAlgorithm: false,
        enableToon: optToon.checked,
        verbose: false,
        headerFromHeightPercentage: 0.05,
        footerFromHeightPercentage: 0.95,
        scale: 1.5,
      };

      const thresholds = {
        textLength: parseInt(optThresholdLength.value || "50", 10),
        wordsPerPage: parseInt(optThresholdWords.value || "10", 10)
      };
      
      const dpiConfig = parseInt(optRenderDPI.value || "72", 10);

      try {
        const t0 = performance.now();
        
        // Ensure pdf.worker.mjs is set to prevent error
        window.pdfjsLib = await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/+esm");
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.worker.mjs";

        // Read buffer FRESH from file to prevent Detached ArrayBuffer Error on re-processing
        const arrayBuffer = await currentFile.arrayBuffer();
        
        const pdf = await reader.open(arrayBuffer);

        loaderText.textContent = "Extracting text…";
        let texts = await reader.getTexts(pdf);

        loaderText.textContent = "Checking scan heuristic…";
        let isScanned = reader.isScanned(texts, thresholds);

        // Render all pages for canvas display first (needed if we perform OCR)
        let canvasMap = null;
        try {
          loaderText.textContent = `Rendering pages at ${dpiConfig} DPI…`;
          canvasMap = await reader.renderAll(pdf, dpiConfig);
        } catch (err) {
          console.warn("Page rendering failed:", err);
        }

        // Apply OCR if necessary & possible (only if globalOcrAdapter initialized properly)
        if (isScanned && canvasMap && window.globalOcrAdapter) {
            try {
              // Run the extraction utilizing the underlying reader's built-in box logic and our pre-inited engine
              texts = await reader.getTextsScanned(window.globalOcrAdapter, canvasMap);
            } catch(e) {
              console.warn("Fallback Web OCR application failed, continuing with regular bounds", e);
            }
        }

        loaderText.textContent = "Grouping lines…";
        const pageLines = reader.getLinesFromTexts(texts);
        const compactLines = reader.getCompactLinesFromTexts(texts, optAlgorithm.value);
        
        let toonOutput = "";
        if (optToon.checked) {
          toonOutput = reader.getLinesFromTextsInToon(texts);
        }

        const elapsed = ((performance.now() - t0)/1000).toFixed(2);

        await reader.destroy(pdf);

        currentResults = { texts, pageLines, compactLines, isScanned, toonOutput, canvasMap, elapsed, numPages: texts.size, options };
        currentPage = 1;

        updateHeaderStatus();
        renderMainView(); 
        renderOutputArea();

        loaderText.classList.add("hidden");
      } catch (err) {
        loaderText.classList.add("hidden");
        emptyPreview.classList.remove("hidden");
        document.getElementById("emptyPreviewWrapper").classList.remove("hidden");
        emptyPreview.innerHTML = `Error: <br/>${err.message}`;
        console.error(err);
      }
    }

    // ── Update Header ────────────────────────────────
    function updateHeaderStatus() {
      const r = currentResults;
      if (!r) return;

      statusHeader.classList.remove("hidden");
      timeVal.textContent = r.elapsed;

      if (r.isScanned) {
        scannedBadge.classList.remove("hidden");
        digitalBadge.classList.add("hidden");
      } else {
         // Reset for successful digital
        scannedBadge.classList.add("hidden");
        digitalBadge.classList.remove("hidden");
      }

      document.getElementById("previewFooter").classList.remove("hidden");
    }

    // ── Render Main Canvas View ──────────────────────
    function renderMainView() {
      if (!currentResults || !currentResults.canvasMap) return;
      
      const r = currentResults;
      emptyPreview.classList.add("hidden");
      document.getElementById("emptyPreviewWrapper").classList.add("hidden");
      pageContainer.classList.remove("hidden");
      pageContainer.innerHTML = "";
      
      // Update Pagination
      pageIndicator.textContent = `${currentPage} / ${r.numPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === r.numPages;

      const canvas = r.canvasMap.get(currentPage);
      if (!canvas) return;

      // The rendered document image layer
      // We apply width/height explicitly based on the wrapper calculations
      const displayImg = document.createElement("img");
      displayImg.id = "renderedCanvasImg";
      displayImg.src = canvas.toDataURL("image/png");
      displayImg.className = "pointer-events-none drop-shadow-md w-full h-full object-contain block transition-all duration-200";
      
      pageContainer.appendChild(displayImg);
      
      // A sizing wrapper to guarantee overlay matches relative layout strictly
      const overlayWrapper = document.createElement("div");
      overlayWrapper.id = "overlayWrapper";
      // ensure we map completely over the canvas boundaries
      overlayWrapper.className = "absolute top-0 left-0 transition-transform duration-200 origin-top-left pointer-events-none";
      overlayWrapper.style.width = canvas.width + "px";
      overlayWrapper.style.height = canvas.height + "px";

      // Bounding boxes overlay
      if (activeViz !== "preview") {
        const overlay = document.createElement("div");
        overlay.className = "bbox-overlay";
        
        const pageData = r.texts.get(currentPage);
        
        // Rendered Width scaling. If actual width of img is different from canvas internal width.
        const cWidth = canvas.width;
        const cHeight = canvas.height;
        
        // Copy handler
        const onClickCopy = (e, text) => {
           navigator.clipboard.writeText(text);
           const pop = document.createElement("div");
           pop.className = "fixed bg-gray-800 text-white text-xs px-2 py-1 rounded shadow-lg pointer-events-none z-[9999]";
           pop.style.left = `${e.clientX + 10}px`;
           pop.style.top = `${e.clientY - 20}px`;
           pop.innerText = "Copied!";
           document.body.appendChild(pop);
           setTimeout(() => pop.remove(), 1000);
        };

        if (activeViz === "words" && pageData && pageData.words) {
          pageData.words.forEach(word => {
            const bbox = document.createElement("div");
            bbox.className = "bbox border border-green-500 bg-green-500/10 cursor-alias";
            
            // Map coordinates scaling directly to CSS top/left percentages relative to the physical container
            // Use Math.max locally over explicit scale modifiers, adjusting only base percentage logic.
            const pX0 = (word.bbox.x0 / cWidth) * 100;
            const pY0 = (word.bbox.y0 / cHeight) * 100;
            const pX1 = (word.bbox.x1 / cWidth) * 100;
            const pY1 = (word.bbox.y1 / cHeight) * 100;
            
            bbox.style.left = `${pX0}%`;
            bbox.style.top = `${pY0}%`;
            bbox.style.width = `${pX1 - pX0}%`;
            bbox.style.height = `${pY1 - pY0}%`;
            bbox.title = `${word.text}\n(Click to copy JSON)`;

            bbox.onclick = (e) => onClickCopy(e, JSON.stringify(word));
            overlay.appendChild(bbox);
          });
        } 
        else if (activeViz === "lines") {
          const lines = r.pageLines.get(currentPage);
          if (lines) {
            lines.forEach(line => {
              const bbox = document.createElement("div");
              bbox.className = "bbox border-2 border-red-500 bg-red-500/10 cursor-alias";
              
              // Map coordinates scaling directly to CSS top/left percentages relative to the physical container
              const pX0 = (line.bbox.x0 / cWidth) * 100;
              const pY0 = (line.bbox.y0 / cHeight) * 100;
              const pX1 = (line.bbox.x1 / cWidth) * 100;
              const pY1 = (line.bbox.y1 / cHeight) * 100;
              
              bbox.style.left = `${pX0}%`;
              bbox.style.top = `${pY0}%`;
              bbox.style.width = `${pX1 - pX0}%`;
              bbox.style.height = `${pY1 - pY0}%`;
              bbox.title = `${line.text}\nLines: ${line.words?.length || '?'}\n(Click to copy JSON)`;

              bbox.onclick = (e) => onClickCopy(e, JSON.stringify(line));
              overlay.appendChild(bbox);
            });
          }
        }

        overlayWrapper.appendChild(overlay);
      }
      
      pageContainer.appendChild(overlayWrapper);
      
      // Force zoom update to recalculate explicit bounds now that canvas width is established
      updateZoom();
    }


    function renderOutputArea() {
      if (!currentResults) return;
      const r = currentResults;
      
      emptyOutput.classList.add("hidden");
      outputContent.classList.remove("hidden");

      switch (currentTab) {
        case "fulltext": {
          let text = "";
          r.texts.forEach((page, num) => {
            text += `── Page ${num} ${"─".repeat(40)}\n${page.fullText}\n\n`;
          });
          outputContent.textContent = text || "(no text extracted)";
          break;
        }
        case "words": {
          const obj = {};
          r.texts.forEach((page, num) => { obj[num] = page; });
          outputContent.textContent = JSON.stringify(obj, null, 2);
          break;
        }
        case "lines": {
          const obj = {};
          r.pageLines.forEach((lines, num) => { obj[num] = lines; });
          outputContent.textContent = JSON.stringify(obj, null, 2);
          break;
        }
        case "compact": {
          const obj = {};
          r.compactLines.forEach((lines, num) => { obj[num] = lines; });
          outputContent.textContent = JSON.stringify(obj, null, 2);
          break;
        }
        case "toon": {
          if (r.toonOutput) {
            outputContent.textContent = r.toonOutput;
          } else {
            outputContent.textContent = "TOON output is disabled. Enable 'Enable TOON' in the config panel and re-process.";
          }
          break;
        }
      }
    }

    // ── Copy ─────────────────────────────────────────
    copyBtn.addEventListener("click", () => {
      const text = outputContent.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="text-green-400" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"></path></svg> Copied!`;
        setTimeout(() => {
          copyBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg> Copy`;
        }, 1500);
      });
    });
  </script>
</body>
